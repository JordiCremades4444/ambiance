<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambiance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111 url('background.jpg') center/cover no-repeat;
      font-family: sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .player {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .controls {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      color: #fff;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(1.06);
    }

    button:active { transform: scale(0.97); }

    #btn-play {
      width: 88px;
      height: 88px;
    }

    #btn-stop {
      width: 60px;
      height: 60px;
    }

    #btn-play svg, #btn-stop svg {
      pointer-events: none;
    }

    .status {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Hide the YouTube iframe off-screen */
    #yt-player {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
    }
  </style>
</head>
<body>

  <div class="player">
    <div class="controls">
      <button id="btn-play" title="Play / Pause">
        <svg id="icon-play" width="34" height="34" viewBox="0 0 24 24" fill="white">
          <polygon points="6,3 20,12 6,21"/>
        </svg>
        <svg id="icon-pause" width="34" height="34" viewBox="0 0 24 24" fill="white" style="display:none">
          <rect x="5" y="3" width="4" height="18" rx="1"/>
          <rect x="15" y="3" width="4" height="18" rx="1"/>
        </svg>
      </button>

      <button id="btn-stop" title="Stop">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </button>
    </div>
    <div class="status" id="status">Loading…</div>
  </div>

  <div id="yt-player"></div>

  <script>
    // ── CONFIG — change VIDEO_ID to swap the track ──────────
    const VIDEO_ID = 'bXTQiTuBkAs';
    // ────────────────────────────────────────────────────────

    let player;
    let ready = false;

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('yt-player', {
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          modestbranding: 1,
          rel: 0,
        },
        events: {
          onReady: onReady,
          onStateChange: onStateChange,
        },
      });
    };

    function onReady() {
      ready = true;
      setStatus('Ready');
    }

    function onStateChange(e) {
      if (e.data === YT.PlayerState.PLAYING) {
        setStatus('Playing');
        showPause(true);
      } else if (e.data === YT.PlayerState.PAUSED) {
        setStatus('Paused');
        showPause(false);
      } else if (e.data === YT.PlayerState.ENDED) {
        setStatus('Replaying…');
        showPause(false);
        player.seekTo(0);
        player.playVideo();
      } else if (e.data === YT.PlayerState.BUFFERING) {
        setStatus('Buffering…');
      }
    }

    function showPause(yes) {
      document.getElementById('icon-play').style.display  = yes ? 'none' : '';
      document.getElementById('icon-pause').style.display = yes ? ''     : 'none';
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    document.getElementById('btn-play').addEventListener('click', () => {
      if (!ready) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        player.playVideo();
      }
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
      if (!ready) return;
      player.stopVideo();
      player.seekTo(0);
      showPause(false);
      setStatus('Stopped');
    });

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  </script>
</body>
</html>
