<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambiance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111 url('background.jpg') center/cover no-repeat;
      font-family: sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .player {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .controls {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      color: #fff;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(1.06);
    }

    button:active { transform: scale(0.97); }

    #btn-play { width: 88px; height: 88px; }
    #btn-stop  { width: 60px;  height: 60px; }

    button svg { pointer-events: none; }

    .status {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- CONFIG: swap the src to change the track -->
  <audio id="audio" src="audio.mp3" preload="auto"></audio>

  <div class="player">
    <div class="controls">
      <button id="btn-play" title="Play / Pause">
        <svg id="icon-play" width="34" height="34" viewBox="0 0 24 24" fill="white">
          <polygon points="6,3 20,12 6,21"/>
        </svg>
        <svg id="icon-pause" width="34" height="34" viewBox="0 0 24 24" fill="white" style="display:none">
          <rect x="5" y="3" width="4" height="18" rx="1"/>
          <rect x="15" y="3" width="4" height="18" rx="1"/>
        </svg>
      </button>

      <button id="btn-stop" title="Stop">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </button>
    </div>
    <div class="status" id="status">Ready</div>
  </div>

  <script>
    const audio  = document.getElementById('audio');
    const status = document.getElementById('status');
    const iconPlay  = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');

    audio.loop = true;

    function showPause(yes) {
      iconPlay.style.display  = yes ? 'none' : '';
      iconPause.style.display = yes ? ''     : 'none';
    }

    document.getElementById('btn-play').addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        status.textContent = 'Playing';
        showPause(true);
      } else {
        audio.pause();
        status.textContent = 'Paused';
        showPause(false);
      }
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
      audio.pause();
      audio.currentTime = 0;
      status.textContent = 'Stopped';
      showPause(false);
    });
  </script>
</body>
</html>
