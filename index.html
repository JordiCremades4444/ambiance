<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambiance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      background: #111 url('background.jpg') center/cover no-repeat;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }
    #timer {
      position: relative;
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 52px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <audio id="audio" src="audio.mp3" preload="auto" loop></audio>
  <div id="timer">00:00:00</div>
  <script>
    const audio = document.getElementById('audio');
    audio.play().catch(() => {
      const start = () => { audio.play(); document.removeEventListener('click', start); };
      document.addEventListener('click', start);
    });

    const timer = document.getElementById('timer');
    const t0 = Date.now();
    setInterval(() => {
      const s = Math.floor((Date.now() - t0) / 1000);
      const pad = n => String(n).padStart(2, '0');
      timer.textContent = `${pad(s / 3600 | 0)}:${pad(s % 3600 / 60 | 0)}:${pad(s % 60)}`;
    }, 1000);
  </script>
</body>
</html>
